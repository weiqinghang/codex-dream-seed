name: test

on:
  push:
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      # Run daemon lifecycle tests in a fresh interpreter before the threaded
      # HTTP suite. macOS and Windows process startup is not safe to validate
      # from a test process that has already hosted worker threads.
      - run: python -m unittest tests.console_runtime_tests -v
      - run: python -m unittest discover -s tests -p "test_*.py" -v
      - run: python scripts/bootstrap.py --workspace "${{ runner.temp }}/codex-dream-workspace"
      - run: python -c "from pathlib import Path; (Path.home() / '.codex/sessions').mkdir(parents=True, exist_ok=True)"
      - run: python scripts/bootstrap.py --workspace "${{ runner.temp }}/codex-dream-workspace" --apply --skip-cli

name: test

on:
  push:
  pull_request:

jobs:
  unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - run: python -m unittest discover -s tests -v
      - run: python scripts/bootstrap.py --workspace "${{ runner.temp }}/codex-dream-workspace"
      - run: python -c "from pathlib import Path; (Path.home() / '.codex/sessions').mkdir(parents=True, exist_ok=True)"
      - run: python scripts/bootstrap.py --workspace "${{ runner.temp }}/codex-dream-workspace" --apply --skip-cli
